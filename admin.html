<!doctype html>
<html lang="pt-MZ">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Área do Administrador — EVZA Gallery</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="manifest.json"><link rel="icon" href="assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page" data-page="admin">
  <main id="admin-root">
    <section class="login-view">
      <div class="login-card">
        <img src="assets/logo.svg" alt="EVZA">
        <h1>Área do Administrador</h1>
        <p>A carregar painel...</p>
      </div>
    </section>
  </main>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      setTimeout(function () {
        var root = document.getElementById('admin-root');
        if (!root || !root.textContent.includes('A carregar painel')) return;
        root.innerHTML = '<section class="login-view"><form class="login-card stack" id="login-form-fallback"><img src="assets/logo.svg" alt="EVZA"><h1>Área do Administrador</h1><input class="field" name="email" type="email" placeholder="Email" required><input class="field" name="password" type="password" placeholder="Palavra-passe" required><button class="btn" type="submit">Entrar</button><p class="meta" id="login-error-fallback">Configure o Supabase em config.js para activar o painel.</p></form></section>';
        var form = document.getElementById('login-form-fallback');
        form.addEventListener('submit', async function (event) {
          event.preventDefault();
          var cfg = window.EVZA || {};
          var error = document.getElementById('login-error-fallback');
          if (!cfg.supabaseUrl || !cfg.supabaseAnonKey || !window.supabase) {
            error.textContent = 'Configure o Supabase em config.js e abra o site com internet.';
            return;
          }
          var client = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
          var data = new FormData(form);
          var result = await client.auth.signInWithPassword({ email: data.get('email'), password: data.get('password') });
          if (result.error) {
            error.textContent = result.error.message;
            return;
          }
          location.reload();
        });
      }, 900);
    });
  </script>
  <script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script type="module" src="app.js"></script>
</body>
</html>
