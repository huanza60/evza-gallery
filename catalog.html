<!DOCTYPE html>
<html lang="pt-MZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Galeria de fotos e vídeos — Escola Vale do Zambeze (EVZA)" />
  <meta name="theme-color" content="#8B3A1E" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" />

  <link rel="stylesheet" href="style.css" />

</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-brand">
        <img src="assets/logo.jpg" alt="EVZA Logo" />
        EVZA Gallery
      </a>
      <button class="navbar-menu-btn" id="nav-menu-btn" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <ul class="navbar-links" id="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="admin.html">Administrador</a></li>
      </ul>

        <p id="catalog-desc"></p>
        <span class="item-count" id="catalog-count"></span>

          <button class="btn-toolbar btn-download" id="btn-download" title="Baixar catálogo inteiro">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

          </button>

      <!-- Masonry Grid -->
      <div class="masonry-grid" id="masonry-grid"></div>
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-content" id="lightbox-content">
      <button class="lightbox-close" id="lightbox-close" aria-label="Fechar">&times;</button>
      <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Anterior">&#8249;</button>
      <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Próximo">&#8250;</button>
      <span class="lightbox-caption" id="lightbox-caption"></span>
      <span class="lightbox-counter" id="lightbox-counter"></span>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <img src="assets/logo.jpg" alt="EVZA Logo" />
      <h3>Escola Primária e Secundária Vale do Zambeze</h3>
      <p>Tete — Moçambique</p>
      <p class="footer-copy">&copy; <span class="footer-year"></span> EVZA Gallery</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="download-share.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});

    }
